name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'          # Triggered by version tags like v1.1.0
  workflow_dispatch:      # Allow manual trigger from GitHub UI

permissions:
  contents: write         # Required to create GitHub Releases

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # ── 3. Install Python dependencies ───────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── 4. Download FFmpeg binaries ──────────────────────────────────────────
      - name: Download FFmpeg
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          New-Item -ItemType Directory -Force -Path ffmpeg
          $binDir = Get-ChildItem -Path ffmpeg_tmp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1 -ExpandProperty DirectoryName
          Copy-Item "$binDir\ffmpeg.exe"  -Destination "ffmpeg\" -Force
          Copy-Item "$binDir\ffplay.exe"  -Destination "ffmpeg\" -Force
          Copy-Item "$binDir\ffprobe.exe" -Destination "ffmpeg\" -Force
          Write-Host "FFmpeg binaries ready:"
          Get-ChildItem ffmpeg\
        shell: powershell

      # ── 5. Build with PyInstaller ────────────────────────────────────────────
      - name: Build executable
        run: |
          # Run PyInstaller directly — exit code 1 is expected due to optional
          # Linux-only imports (secretstorage, curl_cffi) being unavailable on
          # Windows CI runners. The real success indicator is the exe existing.
          python -m PyInstaller --clean --noconfirm build.spec || true

      # ── 5b. Validate build output ────────────────────────────────────────────
      - name: Validate build output
        run: |
          $exe = "dist\youtube-mp3-gui\youtube-mp3-gui.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Build failed: youtube-mp3-gui.exe not found in dist!"
            exit 1
          }
          $sizeMB = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "Build successful! EXE size: $sizeMB MB"
          
          # Verify FFmpeg was bundled
          $ffmpegDir = "dist\youtube-mp3-gui\_internal\ffmpeg"
          foreach ($bin in @("ffmpeg.exe", "ffprobe.exe", "ffplay.exe")) {
            if (-not (Test-Path "$ffmpegDir\$bin")) {
              Write-Error "Missing bundled binary: $bin"
              exit 1
            }
            Write-Host "OK: $bin bundled"
          }
        shell: powershell

      # ── 6. Create ZIP package ────────────────────────────────────────────────
      - name: Create release ZIP
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version.StartsWith("v")) { $version = "dev" }
          $zipName = "youtube-mp3-downloader-$version.zip"
          Compress-Archive -Path "dist\youtube-mp3-gui\*" -DestinationPath $zipName -Force
          Write-Host "Created: $zipName"
          Get-Item $zipName | Select-Object Name, @{N='Size (MB)';E={[math]::Round($_.Length/1MB,1)}}
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
        shell: powershell

      # ── 7. Upload build artifact (always available for download) ─────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-mp3-gui-windows
          path: ${{ env.ZIP_NAME }}
          retention-days: 14

      # ── 8. Create GitHub Release (only on version tags) ──────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: YouTube MP3 Downloader ${{ github.ref_name }}
          body: |
            ## 🎵 YouTube MP3 Downloader ${{ github.ref_name }}

            ### 🐛 Bug Fixes
            - Fixed "Failed" downloads caused by YouTube's updated player signature (`c2f7551f`)
            - Switched to alternative player clients (`mweb`, `android`, `web_creator`) that bypass JS signature extraction
            - Improved error logging — real error messages now appear in the log panel instead of silent failures

            ### 🚀 Getting Started
            1. Download `youtube-mp3-downloader-${{ github.ref_name }}.zip`
            2. Extract the files
            3. Run `youtube-mp3-gui.exe`
            4. Paste YouTube URLs and enjoy!

            ### 📋 System Requirements
            - Windows 10 or later
            - Internet connection
            - No additional software needed — FFmpeg is bundled!
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
